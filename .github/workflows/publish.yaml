name: publish package

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
    paths-ignore:
      - .github/**

jobs:
  publish:
    name: publish package
    uses: strg-at/github-workflows/.github/workflows/npm-publish.yaml@7a8a82348f172ee9bf347905634309cacd45994f # v2.1.10
    with:
      runner: '["ubuntu-latest"]'
