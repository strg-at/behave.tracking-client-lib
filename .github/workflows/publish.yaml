---
name: publish package

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
    paths-ignore:
      - .github/**

jobs:
  publish:
    name: publish package
    uses: strg-at/github-workflows/.github/workflows/npm-publish.yaml@d6794e52b83ef9742b36b435ccfa3935f3ca0121 # v2.1.8
    with:
      runner: '["ubuntu-latest"]'
