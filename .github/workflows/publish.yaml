---
name: publish package

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
    paths-ignore:
      - .github/**

jobs:
  publish:
    name: publish package
    uses: strg-at/github-workflows/.github/workflows/npm-publish.yaml@f09c377ca20e9fccdafeff51e15ae9c57aa6dcdd # v2.2.0
    with:
      runner: '["ubuntu-latest"]'
